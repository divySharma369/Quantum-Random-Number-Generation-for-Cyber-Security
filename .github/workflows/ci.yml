name: Quantum Firewall CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-python-version: '3.10'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install qiskit qiskit-aer

    - name: Run QRNG Performance Benchmark
      run: python tests/performance_bench.py

    - name: Install CMake & Build C++ Components
      run: |
        sudo apt-get install -y cmake
        mkdir build_cpp
        cd build_cpp
        cmake -DCMAKE_BUILD_TYPE=Release ..
        make -j$(nproc)

    - name: Run Packet Filter Simulation
      run: ./build_cpp/packet_filter
